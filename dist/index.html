<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR code component</title>

    <link rel="shortcut icon" href="/src/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="/dist/css/main.css">

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

<body>

    <main class="card">
    
        <div class="card__container">
            <img class="card__container--image" src="/src/images/image-qr-code.png" alt="The QR code picture">

        <div class="card__content">
            <h1 class="card__content--title">

    <footer class="attribution__container">

        <p class="attribution__container--description">
            Challenge by 
            <a class="attribution__container--description-link" href="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H" title="https://www.frontendmentor.io/challenges/qr-code-component-iux_sIO_H" target="_blank" class="attribution__links--website">Frontend Mentor</a>.
            Coded by 
            <a class="attribution__container--description-link" href="https://github.com/zsanifekete/qr-code-component-challenge/" title="https://github.com/zsanifekete/qr-code-component-challenge/" target="_blank" class="attribution__links--author">ZsaniFekete</a>.
        </p>

    </footer>
